<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Examination Batch</title>
<link rel="icon" type="image/png" href="crown.png">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card styling */
.card{
  background:white;
  width:90%;
  max-width:500px;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
  position:relative;
}

/* Buttons */
.batch-btn{
  width:100%;
  padding:14px;
  margin:10px 0;
  font-size:16px;
  font-weight:bold;
  background:#002147;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
.batch-btn:hover{
  background:#0080ff;
  transform:translateY(-2px);
}

/* Loader overlay */
.loader-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(255,255,255,0.95);
  display:flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-radius:12px;
  display: none; /* Hide initially */
}

.spinner {
  border:5px solid #f3f3f3;
  border-top:5px solid #002147;
  border-radius:50%;
  width:50px;
  height:50px;
  animation: spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin {
  0% {transform: rotate(0deg);}
  100% {transform: rotate(360deg);}
}

footer{
  margin-top:20px;
  font-size:12px;
  color:gray;
}
</style>
</head>
<body>

<div class="card">
  <img src="crownload.png" class="logo" style="width:70px; margin-bottom:2px;">
  <h2>WANIJA KIRULA <br>EXAMINATION RESULT PORTAL</h2>
  <p>Select Your Examination Batch to Continue</p>

  <button class="batch-btn" onclick="selectBatch('2026')">Batch 2026</button>
  <button class="batch-btn" onclick="selectBatch('2027')">Batch 2027</button>

  <footer>© 2026 Wanija Kirula Examination Portal</footer>

  <!-- Loader overlay -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="spinner"></div>
    <p style="color:#002147; font-size:16px;">Processing your batch… please wait...</p>
  </div>
</div>

<script>
function selectBatch(batch){
  // Save batch
  localStorage.setItem("selectedBatch", batch);

  // Show loader
  document.getElementById('loaderOverlay').style.display = 'flex';

  // Simulate delay then redirect
  setTimeout(() => {
    window.location.href = "results.html";
  }, 1200); // 1.2 seconds
}
</script>

</body>
</html>
