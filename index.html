<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WANIJA KIRULA EXAMINATION RESULT PORTAL</title>

<link rel="icon" type="image/png" href="crown.png">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
display:flex;
justify-content:center;
}

.card{
background:white;
width:100%;
max-width:420px;
padding:35px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:60px;
margin-bottom:10px;
}

h2{
color:#002147;
margin-bottom:10px;
font-size:22px;
}

p{
color:#555;
margin-bottom:15px;
}

.batch-btn{
width:100%;
padding:14px;
margin:10px 0;
font-size:16px;
font-weight:bold;
background:#002147;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.batch-btn:hover{
background:#0080ff;
transform:translateY(-2px);
}

.loader{
margin-top:15px;
color:#002147;
font-weight:500;
}

footer{
margin-top:20px;
font-size:12px;
color:gray;
}

@media (max-width:480px){

.card{
padding:20px;
}

h2{
font-size:18px;
}

.batch-btn{
font-size:14px;
padding:12px;
}

}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App(){

const [loading,setLoading] = React.useState(false);

React.useEffect(()=>{

// reset loader when page loads
setLoading(false)

},[])

function selectBatch(batch){

localStorage.setItem("selectedBatch",batch)

setLoading(true)

setTimeout(()=>{
window.location.href="results.html"
},1000)

}

return(

<div className="container">

<div className="card">

<img src="crownload.png" className="logo"/>

<h2>
WANIJA KIRULA <br/>
EXAMINATION RESULT PORTAL
</h2>

<p>Select Your Examination Batch to Continue</p>

<button className="batch-btn" onClick={()=>selectBatch("2026")}>
Batch 2026
</button>

<button className="batch-btn" onClick={()=>selectBatch("2027")}>
Batch 2027
</button>

{loading && (
<p className="loader">
Processing your batch… please wait...
</p>
)}

<footer>
© 2026 Wanija Kirula Examination Result Portal
</footer>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>
<script>
window.onpageshow = function(event) {
  if (event.persisted) {
    window.location.reload();
  }
};
</script>
</body>
</html>
