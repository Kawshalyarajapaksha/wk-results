<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WANIJA KIRULA EXAMINATION RESULT PORTAL</title>
<link rel="icon" type="image/png" href="crown.png">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px; /* small padding for mobile */
}

/* Card styling */
.card {
  background: #fff;
  width: 100%;
  max-width: 400px; /* responsive width */
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

/* Buttons */
.batch-btn {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 16px;
  font-weight: bold;
  background: #002147;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
.batch-btn:hover {
  background: #0080ff;
  transform: translateY(-2px);
}

/* Loader text */
#loaderText {
  display: none;
  margin-top: 15px;
  font-size: 16px;
  color: #002147;
}

/* Footer */
footer {
  margin-top: 20px;
  font-size: 12px;
  color: gray;
}

/* Responsive adjustments */
@media (max-width: 480px) {
  .card {
    padding: 20px;
  }
  .batch-btn {
    font-size: 14px;
    padding: 12px;
  }
  #loaderText {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="card">
  <img src="crownload.png" class="logo" style="width:60px; margin-bottom:0px;">
  <h2>WANIJA KIRULA <br>EXAMINATION RESULT PORTAL</h2>
  <p>Select Your Examination Batch to Continue</p>

  <button class="batch-btn" onclick="selectBatch('2026')">Batch 2026</button>
  <button class="batch-btn" onclick="selectBatch('2027')">Batch 2027</button>

  <!-- Loader text -->
  <p id="loaderText">Processing your batch… please wait...</p>

  <footer>© 2026 Wanija Kirula Examination Portal</footer>
    </div>

    <script>
    const loader = document.getElementById('loaderText');

    // Hide loader text initially
    window.addEventListener('DOMContentLoaded', () => {
    loader.style.display = 'none';
    });

    // Detect if coming from back button (bfcache)
    window.addEventListener('pageshow', (event) => {
    if(event.persisted) {
        // Force reload to reset page state
        window.location.reload();
    }
    });

    function selectBatch(batch){
    if(!batch) return;

    // Save selected batch
    localStorage.setItem("selectedBatch", batch);

    // Show loader text
    loader.style.display = 'block';

    // Redirect after short delay
    setTimeout(() => {
        window.location.href = "results.html";
    }, 1000);
    }
    window.addEventListener('DOMContentLoaded', () => {
    const card = document.querySelector('.card');
    if(card){
        // Smooth scroll to card
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    });
    </script>
</body>
</html>
